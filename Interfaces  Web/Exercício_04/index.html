<html>

    <head>
        <meta charset="utf-8">
        <title>Exercício_04</title>
        <link href="estilos.css" rel="stylesheet" type="text/css">
        <script src="scripts.js" language="javascript"></script>
    </head>

    <body>

        <div id="caixa">

            <form action="processamento.php" method="get" enctype="multipart/form-data" onsubmit="return validar()">

                <label for="sigla">SIGLA</label><br>
                <input type="text" name="sigla" id="sigla" placeholder="Digite a sigla do clube..."  minlength="3" maxlength="5"><br><br><br>

                <label for="nome_clube">NOME DO CLUBE</label><br>
                <input type="text" name="nome_clube" id="nome_clube" placeholder="Digite o nome do clube..." size="110" minlength="20" maxlength="100"><br><br><br>

                <label for="data_fundacao">DATA DE FUNDAÇÃO</label><br>
                <input type="date" name="data_fundacao" id="data_fundacao" size="60"><br><br><br>

                <label for="estado">ESTADO</label><br>
                <select name="estado" id="estado">
                    <option value="">-- Selecione um estado --</option>
                    <option value="PR">Paraná</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="SC">Santa Catarina</option>
                </select><br><br><br>

                <div id="area_botoes">

                    <input type="submit" name="acao_submit" id="acao_submit" value="Salvar"">
                    <input type="reset" name="acao_reset" id="acao_reset" value="Limpar">

                </div>

            </form>

        </div>


    </body>

</html>
