<html>
    <head>
        <title>Exercício 04</title>
        <meta charset="UTF-8">
        <link href="estilos.css" rel="stylesheet" type="text/css">
        <!-- Link CDN JQuery -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> 
        <script src="validacoes.js"></script>
    </head>
    <body>
        <div id="quadro">
            <h1>Cadastro de Clubes</h1>
            <hr>
            <ul id="erros">
            </ul>
            <form action="processamento.py" onsubmit="return validarJQuery()" method="post"
                <label for="sigla">Sigla:</label>
                <input type="text" id="sigla" name="sigla" size="10" class="obg"><br><br>

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" size="30" maxlength="100"><br><br>

                <label for="data">Data de Fundação:</label>
                <input type="date" id="data" name="data" size="20" class="obg"><br><br>

                <label for="cep">CEP:</label>
                <input type="text" id="cep" name="cep" size="10"><input type="button" value="Buscar Endereço" onclick="buscarcep()"><br><br>

                <label for="logradouro">Logradouro:</label>
                <input type="text" id="logradouro" name="logradouro" size="30"><br><br>

                <label for="estado">Estado:</label>
                <select id="estado" name="estado" class="obg">
                    <option value="">-- Selecione um Estad --</option>
                    <option value="PR">Paraná</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="SC">Santa Catarina</option>
                </select><br><br>

                <input type="submit" value="Salvar">
                <input type="reset" value="Limpar">
            </form>
        </div>
    </body>
</html>
