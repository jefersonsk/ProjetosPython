<html>
    <head>
        <title>Prova II - Interfaces Web - 2025/1</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="estilos.css" rel="stylesheet" type="text/css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <script src="scripts.js"></script>
    </head>
    <body>
        <main id="principal">
			<section id="cabecalho">
				<header id="banner">
					<h1>Meu Guia de Empresas</h1>
					<p>Cadastre sua Empresa Aqui</p>
				</header>

				<nav id="menu">
					<a href="index.html">Início</a>
				</nav>
			</section>

            <section id="conteudo">
		        <h2>Cadastro de Empresas</h2>
				
				<hr>       
				<ul id="erros"></ul>
				<form action="Processamento" method="post" onblur="">
					<label for="cnpj">CNPJ: </label>
					<input type="text" name="cnpj" id="cnpj" size="18"><br><br>

					<label for="razao">Razão Social: </label>
					<input type="text" name="razao" id="razao" size="30" min="10" max="100"><br><br>

					<label for="endereco">Endereço: </label><br>
					<textarea name="endereco" id="endereco" rows="5" cols="50"></textarea><br><br>
				
					<label for="email">E-mail: </label>
					<input type="text" name="email" id="email" size="30"><br><br>

					<label for="telefone">Telefone: </label>
					<input type="text" name="telefone" id="telefone"  size="15"><br><br>

					<label for="secao">Seção: </label>
					<select name="secao" id="secao" onchange="popularGrupos()">
						<option value="">Selecione uma Seção</option>
					</select><br><br>
					
					<table>
						<thead>
							<tr>
								<th colspan="3">Grupo</th>
							</tr>
							<tr>
								<th>Seleção</th>
								<th>Descrição</td>
								<th>Divisão</th>
							</tr>
						</thead>
						<tbody>
						</tbody>
					</table><br><br>
				
					<input type="submit" name="acao" value="Inserir">
					<input type="reset" value="Limpar">
				</form>	
            </section>

            <footer id="rodape">
                <div id="endereco">
                    <p>Rua Alberto Hoffmann, 285 | Bairro Restinga | CEP: 91791-508 | Porto Alegre/RS</p>
                    <div id="redes">
                        <img src="imagens/facebook.jpg" width="29" height="29">
                        <img src="imagens/instagram.png" width="29" height="29">
                        <img src="imagens/youtube.png" width="29" height="29">
                    </div>
                </div>
            </footer>
        </main>
    </body>
</html>
